apiVersion: releasea.io/v1
kind: ReleaseaTemplate
id: microservice-node-fastify
name: Node.js (Fastify)
version: 1.0.0
templateType: microservice
description: Fastify API starter focused on high throughput, low overhead, and reliable health checks for production workloads.
icon: Server
category: Compute
owner: Platform team
bestFor: High-throughput APIs and internal services
defaults: Node 20, Fastify runtime, Dockerfile
setupTime: About 5 min
tier: Core
highlights:
  - Low-overhead HTTP server
  - Health checks
  - Container-ready
repoMode: template
templateDefaults:
  serviceName: fastify-api
  port: "3000"
  healthCheckPath: /healthz
  dockerCommand: npm run start
source:
  owner: releasea
  repo: templates
  path: api-node-fastify
