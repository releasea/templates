apiVersion: releasea.io/v1
kind: ReleaseaTemplate
id: site-python-mkdocs
name: Static Site (MkDocs)
version: 1.0.0
templateType: static-site
description: MkDocs template for technical documentation with fast static builds and simple markdown authoring.
icon: Globe
category: External
owner: Web platform
bestFor: Product docs and internal knowledge bases
defaults: MkDocs static build, site output
setupTime: About 3 min
tier: External
highlights:
  - Markdown-first docs
  - Fast static generation
  - Simple build workflow
repoMode: template
templateDefaults:
  serviceName: mkdocs-site
  framework: mkdocs
  installCommand: pip install -r requirements.txt
  buildCommand: mkdocs build --clean
  outputDir: site
  cacheTtl: "3600"
source:
  owner: releasea
  repo: templates
  path: site-python-mkdocs
