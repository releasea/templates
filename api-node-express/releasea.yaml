apiVersion: releasea.io/v1
kind: ReleaseaTemplate
id: microservice-node
name: Node.js Microservice
version: 1.0.0
templateType: microservice
description: Express API starter with health endpoint, Dockerfile, and production-safe defaults for fast service delivery.
icon: Server
category: Compute
owner: Platform team
bestFor: APIs and internal services
defaults: Node 20, Dockerfile, health checks
setupTime: About 5 min
tier: Core
highlights:
  - Autoscaling-ready
  - Health checks
  - Rolling deploys
templateDefaults:
  serviceName: node-api
  port: "3000"
  healthCheckPath: /healthz
  dockerCommand: npm run start
  preDeployCommand: npm run migrate
repoMode: template
source:
  owner: releasea
  repo: templates
  path: api-node-express
