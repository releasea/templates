apiVersion: releasea.io/v1
kind: ReleaseaTemplate
id: site-node-eleventy
name: Static Site (Eleventy)
version: 1.0.0
templateType: static-site
description: Eleventy static-site template with simple conventions and efficient output for documentation and blogs.
icon: Globe
category: External
owner: Web platform
bestFor: Documentation, blogs, and lightweight content sites
defaults: 11ty build, _site output
setupTime: About 4 min
tier: External
highlights:
  - Minimal toolchain
  - Fast static generation
  - Easy content workflows
templateDefaults:
  serviceName: eleventy-site
  framework: eleventy
  installCommand: npm install
  buildCommand: npm run build
  outputDir: _site
  cacheTtl: "3600"
repoMode: template
source:
  owner: releasea
  repo: templates
  path: site-node-eleventy
